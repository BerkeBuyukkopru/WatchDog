services:
  # 1. Veritabanı Servisi
  watchdog-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: watchdog-sql
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  # 2. API Servisi
  watchdog-api:
    build:
      context: .
      dockerfile: backend/src/Presentation/Watchdog.Api/Dockerfile
    container_name: watchdog-api
    ports:
      - "${API_PORT}:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=watchdog-db;Database=${DB_NAME};User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - watchdog-db

  # 3. Worker Servisi
  watchdog-worker:
    build:
      context: .
      dockerfile: backend/src/Presentation/Watchdog.Worker/Dockerfile
    container_name: watchdog-worker
    environment:
      - ConnectionStrings__DefaultConnection=Server=watchdog-db;Database=${DB_NAME};User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - watchdog-db

  # 4. Frontend Servisi (Yeni)
  watchdog-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: watchdog-ui
    ports:
      - "5173:80"
    environment:
      - VITE_API_URL=http://localhost:5226
    depends_on:
      - watchdog-api

volumes:
  sql_data:
